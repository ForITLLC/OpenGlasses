name: Build & Upload to App Store Connect

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SCHEME: OpenGlasses
  PROJECT: OpenGlasses.xcodeproj
  TEAM_ID: UUSSWWML2A
  ASC_KEY_ID: 78ND83SSBB
  ASC_ISSUER_ID: b21bbf92-e667-43f9-b358-29908a814489

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 26.2 (default on macos-26 runner, iOS 26 SDK)
          sudo xcode-select -s /Applications/Xcode_26.2.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Verify iOS SDK
        run: |
          xcrun simctl list runtimes | head -5

      - name: Install signing materials
        env:
          DISTRIBUTION_CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          DISTRIBUTION_KEY_BASE64: ${{ secrets.DISTRIBUTION_KEY_BASE64 }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          WATCH_PROFILE_BASE64: ${{ secrets.WATCH_PROFILE_BASE64 }}
          WIDGET_PROFILE_BASE64: ${{ secrets.WIDGET_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import cert + key
          echo -n "$DISTRIBUTION_CERT_BASE64" | base64 -D > $RUNNER_TEMP/dist.cer
          security import $RUNNER_TEMP/dist.cer -k $KEYCHAIN_PATH -A
          echo -n "$DISTRIBUTION_KEY_BASE64" | base64 -D > $RUNNER_TEMP/dist.key
          security import $RUNNER_TEMP/dist.key -k $KEYCHAIN_PATH -A

          # Apple WWDR intermediate
          curl -sO https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import AppleWWDRCAG3.cer -k $KEYCHAIN_PATH

          security list-keychains -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Install all 3 provisioning profiles
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 -D > "$PP_DIR/openglasses.mobileprovision"
          echo -n "$WATCH_PROFILE_BASE64" | base64 -D > "$PP_DIR/watch.mobileprovision"
          echo -n "$WIDGET_PROFILE_BASE64" | base64 -D > "$PP_DIR/widget.mobileprovision"

          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Create Secrets.plist
        env:
          DOLORES_API_KEY: ${{ secrets.DOLORES_API_KEY }}
        run: |
          cat > OpenGlasses/Secrets.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>DOLORES_API_KEY</key>
            <string>${DOLORES_API_KEY:-placeholder}</string>
          </dict>
          </plist>
          PLIST

      - name: Generate Xcode project
        run: |
          brew install xcodegen || true
          xcodegen

      - name: Archive
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$ASC_KEY_BASE64" | base64 -D > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcodebuild -project $PROJECT -scheme $SCHEME \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/OpenGlasses.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution: ForIT Limited Liability Company ($TEAM_ID)" \
            ENABLE_PREVIEWS=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=NO \
            archive

      - name: Export & Upload
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$ASC_KEY_BASE64" | base64 -D > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          cat > $RUNNER_TEMP/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>UUSSWWML2A</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/OpenGlasses.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID

      - name: Clear export compliance + assign to internal group
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          APP_ID: "6761319043"
          GROUP_ID: "dcdf189d-49f3-422e-b62d-f091436d524b"
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography
          python3 << 'PYEOF'
          import jwt, time, json, os, urllib.request, urllib.error, base64
          key_pem = base64.b64decode(os.environ["ASC_KEY_BASE64"]).decode()
          token = jwt.encode(
              {"iss": os.environ["ASC_ISSUER_ID"], "iat": int(time.time()), "exp": int(time.time())+600, "aud": "appstoreconnect-v1"},
              key_pem, algorithm="ES256", headers={"kid": os.environ["ASC_KEY_ID"]},
          )
          h = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          APP = os.environ["APP_ID"]
          GROUP = os.environ["GROUP_ID"]
          # Poll for latest build to be VALID (processing takes ~1-3 min)
          bid = None
          for attempt in range(20):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com/v1/builds?filter[app]={APP}&sort=-uploadedDate&limit=1",
                  headers=h,
              )
              builds = json.load(urllib.request.urlopen(req))
              if builds["data"]:
                  latest = builds["data"][0]
                  if latest["attributes"]["processingState"] == "VALID":
                      bid = latest["id"]
                      print(f"Build {latest['attributes']['version']} is VALID")
                      break
                  print(f"Attempt {attempt+1}: state={latest['attributes']['processingState']}, waiting 30s")
              time.sleep(30)
          if not bid:
              print("Build did not become VALID in time — skipping")
              raise SystemExit(0)
          # Clear export compliance
          body = json.dumps({"data": {"type": "builds", "id": bid, "attributes": {"usesNonExemptEncryption": False}}}).encode()
          req = urllib.request.Request(f"https://api.appstoreconnect.apple.com/v1/builds/{bid}", data=body, headers=h, method="PATCH")
          try:
              resp = urllib.request.urlopen(req)
              print(f"Cleared export compliance — {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"Export compliance patch: {e.code} {e.read().decode()[:200]}")
          # Assign to beta group
          body = json.dumps({"data": [{"type": "builds", "id": bid}]}).encode()
          req = urllib.request.Request(f"https://api.appstoreconnect.apple.com/v1/betaGroups/{GROUP}/relationships/builds", data=body, headers=h, method="POST")
          try:
              resp = urllib.request.urlopen(req)
              print(f"Assigned to beta group — {resp.status}")
          except urllib.error.HTTPError as e:
              if e.code == 409:
                  print("Already assigned (409) — ok")
              else:
                  print(f"ERROR {e.code}: {e.read().decode()}")
          PYEOF

      - name: Cleanup
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
