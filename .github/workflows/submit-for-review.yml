name: Submit for App Store Review

on:
  workflow_dispatch:

env:
  ASC_KEY_ID: 78ND83SSBB
  ASC_ISSUER_ID: b21bbf92-e667-43f9-b358-29908a814489

jobs:
  submit:
    runs-on: macos-26
    steps:
      - name: Setup ASC API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$ASC_KEY_BASE64" | base64 -D > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Install PyJWT
        run: pip3 install --break-system-packages PyJWT cryptography

      - name: Query apps and submit for review
        run: |
          python3 << 'PYEOF'
          import jwt, time, json, urllib.request, os

          KEY_ID = os.environ["ASC_KEY_ID"]
          ISSUER_ID = os.environ["ASC_ISSUER_ID"]
          KEY_FILE = os.path.expanduser(f"~/.private_keys/AuthKey_{KEY_ID}.p8")

          # Generate JWT
          with open(KEY_FILE, "r") as f:
              private_key = f.read()

          now = int(time.time())
          token = jwt.encode(
              {"iss": ISSUER_ID, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"},
              private_key,
              algorithm="ES256",
              headers={"kid": KEY_ID},
          )
          print(f"JWT generated (len={len(token)})")

          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          def asc_get(path):
              url = f"https://api.appstoreconnect.apple.com{path}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"ERROR: {e.code} {body[:500]}")
                  return None

          def asc_post(path, data):
              url = f"https://api.appstoreconnect.apple.com{path}"
              req = urllib.request.Request(url, data=json.dumps(data).encode(), headers=headers, method="POST")
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"ERROR: {e.code} {body[:500]}")
                  return None

          # List apps
          print("=== Apps ===")
          apps = asc_get("/v1/apps?fields%5Bapps%5D=name,bundleId&limit=10")
          if not apps:
              exit(1)

          for app in apps["data"]:
              attrs = app["attributes"]
              print(f"  {attrs['name']} ({attrs['bundleId']}) id={app['id']}")

          # For each app, check versions and submit
          for app in apps["data"]:
              app_id = app["id"]
              app_name = app["attributes"]["name"]
              print(f"\n=== Processing: {app_name} ===")

              versions = asc_get(
                  f"/v1/apps/{app_id}/appStoreVersions"
                  f"?fields%5BappStoreVersions%5D=versionString,appStoreState&limit=5"
              )
              if not versions or not versions.get("data"):
                  print("  No editable versions found")
                  continue

              for v in versions["data"]:
                  va = v["attributes"]
                  print(f"  Version {va['versionString']} state={va['appStoreState']} id={v['id']}")

              # Find READY_FOR_SUBMISSION
              # Check for submittable states
              submittable_states = {"READY_FOR_SUBMISSION", "PREPARE_FOR_SUBMISSION", "READY_FOR_REVIEW"}
              ready = [v for v in versions["data"] if v["attributes"]["appStoreState"] in submittable_states]
              if not ready:
                  print("  No version in submittable state.")
                  print("  May need: screenshots, build selection, or privacy questionnaire.")
                  continue

              version_id = ready[0]["id"]
              print(f"  Submitting {version_id} for review...")
              result = asc_post("/v1/appStoreVersionSubmissions", {
                  "data": {
                      "type": "appStoreVersionSubmissions",
                      "relationships": {
                          "appStoreVersion": {
                              "data": {"type": "appStoreVersions", "id": version_id}
                          }
                      }
                  }
              })
              if result:
                  print(f"  SUBMITTED! id={result['data']['id']}")
              else:
                  print("  Submission failed — check errors above")

          print("\n=== Done ===")
          PYEOF
