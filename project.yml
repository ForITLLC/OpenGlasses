name: OpenGlasses
options:
  bundleIdPrefix: com.openglasses
  deploymentTarget:
    iOS: "26.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  meta-wearables-dat-ios:
    url: https://github.com/facebook/meta-wearables-dat-ios.git
    from: "0.3.0"

targets:
  OpenGlasses:
    type: application
    platform: iOS
    sources:
      - path: OpenGlasses/Sources
      - path: OpenGlasses/Secrets.plist
        buildPhase: resources
        optional: true
    resources:
      - path: OpenGlasses/Sources/Resources
    info:
      path: OpenGlasses/Info.plist
      properties:
        CFBundleName: "Dolores Glasses"
        CFBundleDisplayName: "Dolores Glasses"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Dolores needs microphone access to listen for wake words and transcribe your voice commands."
        NSSpeechRecognitionUsageDescription: "Dolores uses speech recognition to detect the wake word and transcribe your questions."
        NSPhotoLibraryAddUsageDescription: "Dolores saves photos taken with your Ray-Ban Meta glasses to your photo library."
        NSCameraUsageDescription: "Dolores needs camera access to capture photos and video for the AI to analyze."
        NSBluetoothAlwaysUsageDescription: "Dolores uses Bluetooth to connect to your Ray-Ban Meta smart glasses."
        NSBluetoothPeripheralUsageDescription: "Dolores uses Bluetooth to connect to your Ray-Ban Meta smart glasses."
        NSLocationWhenInUseUsageDescription: "Dolores uses your location to provide contextually relevant answers based on where you are."
        UIBackgroundModes:
          - audio
          - bluetooth-central
        LSApplicationQueriesSchemes:
          - "fb-viewapp"
        MWDAT:
          AppLinkURLScheme: "https://straff2002.github.io/OpenGlasses"
          MetaAppID: "688603774243722"
          ClientToken: "AR|688603774243722|906db0d1b28450fdb718401ca16b9d60"
          TeamID: "$(DEVELOPMENT_TEAM)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "mwdat-688603774243722"
    entitlements:
      path: OpenGlasses/OpenGlasses.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forit.openglasses.dolores
        DEVELOPMENT_TEAM: YSK4U56F2F
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: "Automatic"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
    dependencies:
      - package: meta-wearables-dat-ios
        product: MWDATCore
      - package: meta-wearables-dat-ios
        product: MWDATCamera

  DoloresWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: DoloresWatch
        excludes:
          - "**/*.plist"
    resources:
      - path: DoloresWatch/Assets.xcassets
      - path: DoloresWatch/Secrets.plist
    info:
      path: DoloresWatch/Info.plist
      properties:
        WKApplication: true
        CFBundleName: "Dolores"
        CFBundleDisplayName: "Dolores"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forit.openglasses.dolores.watchkitapp
        DEVELOPMENT_TEAM: YSK4U56F2F
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: "Automatic"
